  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Quicksand', 'sans-serif'],

          colors: {
            primaBlue: '#8b5cf6',      // Violeta Eléctrico

            primaGreen: '#39ff14',     // Toxic Lime / Verde radioactivo
            primaRed: '#ff0055',       // Crimson Rose / Rosa de alta frecuencia
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
      --intro-length: 3.4s;
      --motion-fast: 0.58s;
      --motion-base: 0.88s;
      --motion-slow: 1.85s;
    }

    body.site-intro-active,
    body.audience-entry:not(.catalog-active) {
      background: linear-gradient(145deg, #faf8f5 0%, #eef2f7 45%, #f3eef8 100%);
    }

    /* GPU-friendly motion defaults */
    .audience-enter,
    .neon-slide-item,
    .catalog-illuminable,
    .word-card,
    #landingView,
    #mainAppView,
    #introReveal,
    #audienceSelector,
    #siteIntroScreen {
      -webkit-font-smoothing: antialiased;
    }

    body.intro-active .prina-mesh-bg,
    body.intro-active .prina-mesh-bg::before,
    body.intro-active .marquee-track-container {
      animation-play-state: paused;
    }

    body.intro-active:not(.guide-mode) .prina-mesh-bg::before {
      transition: filter 1s var(--ease-smooth);
      filter: blur(38px);
    }

    body.intro-active:not(.guide-mode) .cyber-grid {
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    body.intro-active .bottom-ambient-glow.active {
      animation-play-state: paused;
    }

    .search-hit {
      background: rgba(0, 240, 255, 0.22);
      color: inherit;
      border-radius: 0.2rem;
      padding: 0 0.15rem;
    }

    body.guide-mode .search-hit {
      background: rgba(139, 92, 246, 0.18);
    }

    .guide-extras-panel {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      border-radius: 0.875rem;
      border: 1px solid rgba(226, 232, 240, 0.95);
      background: rgba(248, 250, 252, 0.72);
      overflow: hidden;
    }

    .guide-extra-item {
      padding: 0.75rem 0.875rem;
      border-radius: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(226, 232, 240, 0.75);
    }

    .guide-extra-item:last-child {
      border-bottom: none;
    }

    .guide-extra-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.5625rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.2rem 0.5rem;
      border-radius: 9999px;
      margin-bottom: 0.45rem;
      border: 1px solid transparent;
    }

    .guide-extra-tag-formal {
      color: #6d28d9;
      background: rgba(237, 233, 254, 0.9);
      border-color: rgba(196, 181, 253, 0.55);
    }

    .guide-extra-tag-context {
      color: #0369a1;
      background: rgba(224, 242, 254, 0.9);
      border-color: rgba(186, 230, 253, 0.55);
    }

    .guide-extra-tag-ask {
      color: #047857;
      background: rgba(209, 250, 229, 0.9);
      border-color: rgba(167, 243, 208, 0.55);
    }

    .guide-extra-item p {
      font-size: 0.8125rem;
      line-height: 1.55;
      color: #475569;
    }

    .related-word-btn {
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 0.35rem 0.65rem;
      border-radius: 9999px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      transition: all 0.2s ease;
    }

    body.guide-mode .related-word-btn {
      background: #fff;
      color: #5b21b6;
      border-color: #ddd6fe;
    }

    body.guide-mode .related-word-btn:hover {
      background: #f5f3ff;
    }

    body:not(.guide-mode) .related-word-btn {
      background: rgba(15, 23, 42, 0.6);
      color: #67e8f9;
      border-color: rgba(0, 240, 255, 0.25);
    }

    body:not(.guide-mode) .related-word-btn:hover {
      background: rgba(15, 23, 42, 0.9);
    }

    .youth-reactions-panel {
      padding: 0.5rem 0.625rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(0, 240, 255, 0.14);
      background: rgba(15, 23, 42, 0.5);
    }

    .youth-reactions-row {
      display: flex;
      gap: 0.35rem;
    }

    .youth-reaction-btn {
      flex: 1;
      min-width: 0;
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      padding: 0.3rem 0.35rem;
      border-radius: 9999px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(15, 23, 42, 0.65);
      color: #94a3b8;
      font-size: 0.5625rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      transition: border-color 0.25s var(--ease-smooth), background 0.25s var(--ease-smooth), color 0.25s var(--ease-smooth), box-shadow 0.25s var(--ease-smooth), transform 0.15s var(--ease-smooth);
      cursor: pointer;
    }

    .youth-reaction-btn .youth-reaction-emoji {
      font-size: 0.75rem;
      line-height: 1;
    }

    .youth-reaction-btn:hover {
      border-color: rgba(0, 240, 255, 0.35);
      color: #e2e8f0;
    }

    .youth-reaction-btn:active {
      transform: scale(0.96);
    }

    .youth-reaction-cringe.active {
      border-color: rgba(255, 0, 85, 0.7);
      background: rgba(255, 0, 85, 0.14);
      color: #fda4af;
      box-shadow: 0 0 18px rgba(255, 0, 85, 0.28);
    }

    .youth-reaction-mid.active {
      border-color: rgba(148, 163, 184, 0.65);
      background: rgba(71, 85, 105, 0.35);
      color: #e2e8f0;
      box-shadow: 0 0 12px rgba(148, 163, 184, 0.2);
    }

    .youth-reaction-aura.active {
      border-color: rgba(255, 234, 0, 0.6);
      background: linear-gradient(135deg, rgba(255, 234, 0, 0.14), rgba(0, 240, 255, 0.12));
      color: #fde047;
      box-shadow: 0 0 22px rgba(255, 234, 0, 0.25), 0 0 36px rgba(0, 240, 255, 0.15);
      animation: youthAuraGlow 1.8s ease-in-out infinite;
    }

    @keyframes youthAuraGlow {
      0%, 100% { box-shadow: 0 0 18px rgba(255, 234, 0, 0.22); }
      50% { box-shadow: 0 0 30px rgba(0, 240, 255, 0.32); }
    }

    @keyframes youthReactionPop {
      0% { transform: scale(1); }
      45% { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    .youth-reaction-pop {
      animation: youthReactionPop 0.35s var(--ease-smooth);
    }

    .youth-card-reaction {
      font-size: 0.875rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .youth-reaction-ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      vertical-align: middle;
    }

    .youth-reaction-ring svg {
      display: block;
    }

    .youth-reaction-ring.is-empty {
      opacity: 0.4;
    }

    /* Landing primary actions — big, easy to tap */
    .landing-actions-panel {
      width: 100%;
      max-width: 28rem;
      margin-left: auto;
      margin-right: auto;
    }

    .landing-change-mode-row {
      margin-top: -0.25rem;
      margin-bottom: -0.5rem;
    }

    .landing-actions-duo {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 0.75rem;
      width: 100%;
      max-width: 32rem;
      margin: 0.25rem auto 0;
    }

    .landing-action-duo {
      flex: 1 1 0;
      min-width: 0;
      min-height: 3.25rem;
      padding: 0.85rem 0.7rem;
      font-size: 0.875rem;
    }

    .landing-action-duo span {
      line-height: 1.2;
    }

    @media (max-width: 420px) {
      .landing-actions-duo {
        flex-direction: column;
      }
    }

    .landing-action-primary,
    .landing-action-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: 100%;
      min-height: 3.35rem;
      padding: 0.95rem 1.35rem;
      border-radius: 1rem;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.2;
      transition: transform 0.2s var(--ease-smooth), box-shadow 0.2s var(--ease-smooth), background 0.2s var(--ease-smooth);
      cursor: pointer;
    }

    .landing-action-primary:active,
    .landing-action-secondary:active {
      transform: scale(0.98);
    }

    body:not(.guide-mode) .landing-action-primary {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: #fff;
      border: 1px solid rgba(0, 240, 255, 0.35);
      box-shadow: 0 10px 28px rgba(0, 240, 255, 0.22);
    }

    body:not(.guide-mode) .landing-action-primary:hover {
      box-shadow: 0 14px 36px rgba(0, 240, 255, 0.32);
    }

    body:not(.guide-mode) .landing-action-secondary {
      background: rgba(15, 23, 42, 0.75);
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    body:not(.guide-mode) .landing-action-secondary:hover {
      border-color: rgba(0, 240, 255, 0.35);
      color: #67e8f9;
    }

    body.guide-mode .landing-action-primary {
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: #fff;
      border: 1px solid #c4b5fd;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.2);
      font-size: 1.0625rem;
    }

    body.guide-mode .landing-action-secondary {
      background: #ffffff;
      color: #475569;
      border: 2px solid #e2e8f0;
      font-size: 1rem;
      font-weight: 700;
    }

    body.guide-mode .landing-action-secondary:hover {
      border-color: #c4b5fd;
      color: #6d28d9;
      background: #faf5ff;
    }

    .catalog-nav-btn {
      min-height: 2.75rem;
      padding: 0.65rem 1.15rem;
      font-size: 0.9375rem;
      font-weight: 700;
    }

    body.guide-mode .catalog-nav-btn {
      min-height: 3rem;
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
    }

    .landing-search-wrap {
      position: relative;
      z-index: 30;
      width: 100%;
      max-width: 36rem;
      margin-left: auto;
      margin-right: auto;
    }

    .landing-search-wrap.is-open {
      z-index: 60;
    }

    .landing-popular-section {
      position: relative;
      z-index: 1;
    }

    body.landing-search-active .landing-popular-section {
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.25s var(--ease-smooth);
    }

    body.landing-search-active .landing-popular-section .marquee-track-container {
      animation-play-state: paused;
    }

    .catalog-search-wrap {
      position: relative;
      width: 100%;
    }

    @media (min-width: 768px) {
      .catalog-search-wrap {
        width: 24rem;
      }
    }

    @media (min-width: 1024px) {
      .catalog-search-wrap {
        width: 31.25rem;
      }
    }

    .landing-search-suggestions {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 0.35rem);
      z-index: 100;
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 0.875rem;
      padding: 0.5rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55);
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      max-height: min(42vh, 240px);
      overflow-y: auto;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    body.guide-mode .landing-search-suggestions {
      background: #ffffff;
      border-color: #e2e8f0;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
    }

    .landing-search-suggestions.hidden {
      display: none;
    }

    .landing-suggestion-btn {
      font-size: 0.8125rem;
      font-weight: 700;
      padding: 0.45rem 0.75rem;
      border-radius: 9999px;
      border: 1px solid rgba(0, 240, 255, 0.25);
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      cursor: pointer;
    }

    body.guide-mode .landing-suggestion-btn {
      border-color: #e2e8f0;
      background: #f8fafc;
      color: #475569;
      font-size: 0.9375rem;
      padding: 0.5rem 0.875rem;
    }

    .landing-search-hint {
      font-size: 0.75rem;
      color: #94a3b8;
      padding: 0.35rem 0.5rem;
      width: 100%;
    }

    body.guide-mode .landing-search-hint {
      color: #64748b;
      font-size: 0.875rem;
    }

    /* Reaction-colored light beam on word boxes (youth) */
    .youth-reaction-beam {
      position: relative;
      overflow: hidden;
    }

    .youth-reaction-beam-track {
      position: absolute;
      inset: -20% -80%;
      background: linear-gradient(
        105deg,
        transparent 0%,
        transparent 28%,
        var(--reaction-beam-soft, rgba(0, 240, 255, 0.18)) 40%,
        var(--reaction-beam-core, rgba(255, 255, 255, 0.48)) 50%,
        var(--reaction-beam-soft, rgba(0, 240, 255, 0.18)) 60%,
        transparent 72%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 1;
      opacity: 0.55;
      transform: translate3d(-18%, 0, 0) skewX(-14deg);
      animation: none;
    }

    .youth-reaction-beam:hover .youth-reaction-beam-track,
    .youth-reaction-beam.beam-visible .youth-reaction-beam-track {
      opacity: 0.82;
      animation: youthReactionBeamSweep 5s linear infinite;
    }

    .youth-reaction-beam > *:not(.youth-reaction-beam-track) {
      position: relative;
      z-index: 2;
    }

    .youth-reaction-beam--cringe {
      --reaction-beam-soft: rgba(255, 0, 85, 0.28);
      --reaction-beam-core: rgba(255, 120, 160, 0.55);
      box-shadow: 0 0 22px rgba(255, 0, 85, 0.14), inset 0 0 0 1px rgba(255, 0, 85, 0.2);
    }

    .youth-reaction-beam--mid {
      --reaction-beam-soft: rgba(148, 163, 184, 0.32);
      --reaction-beam-core: rgba(203, 213, 225, 0.45);
      box-shadow: 0 0 16px rgba(148, 163, 184, 0.12), inset 0 0 0 1px rgba(148, 163, 184, 0.22);
    }

    .youth-reaction-beam--aura {
      --reaction-beam-soft: rgba(255, 234, 0, 0.26);
      --reaction-beam-core: rgba(0, 240, 255, 0.5);
      box-shadow: 0 0 24px rgba(255, 234, 0, 0.14), 0 0 32px rgba(0, 240, 255, 0.1), inset 0 0 0 1px rgba(255, 234, 0, 0.22);
    }

    @keyframes youthReactionBeamSweep {
      0% { transform: translate3d(-72%, 0, 0) skewX(-14deg); }
      100% { transform: translate3d(72%, 0, 0) skewX(-14deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .prina-mesh-bg::before,
      .marquee-track-container,
      .bottom-ambient-glow.active {
        animation: none !important;
      }

      .neon-slide-item,
      .catalog-illuminable,
      .audience-enter,
      .site-intro-enter,
      #landingView,
      #mainAppView,
      #audienceSelector {
        transition-duration: 0.2s !important;
      }

      .light-beam,
      .glass-reflection,
      .ambient-glow,
      #introLogo {
        animation-duration: 1.2s !important;
      }

      .youth-reaction-beam-track {
        animation: none !important;
        opacity: 0.35;
        transform: translate3d(0, 0, 0) skewX(-14deg);
      }

      #legendParticles,
      .legend-burst,
      .legendary-title-shimmer {
        display: none !important;
      }

      #siteIntroScreen.reveal-active .site-intro-enter,
      #audienceSelector.reveal-active .audience-enter {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }

    /* Palabra del día */
    .daily-word-card {
      border-radius: 1rem;
      padding: 0.875rem 1.25rem;
      text-align: left;
      width: 100%;
      transition: transform 0.25s var(--ease-smooth), box-shadow 0.25s var(--ease-smooth);
    }

    body:not(.guide-mode) .daily-word-card {
      background: linear-gradient(135deg, rgba(255, 234, 0, 0.08), rgba(139, 92, 246, 0.12));
      border: 1px solid rgba(255, 234, 0, 0.22);
      box-shadow: 0 0 24px rgba(255, 234, 0, 0.06);
    }

    body:not(.guide-mode) .daily-word-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(139, 92, 246, 0.18);
    }

    body.guide-mode .daily-word-card {
      background: #fff;
      border: 1px solid #fde68a;
      box-shadow: 0 4px 16px rgba(251, 191, 36, 0.12);
    }

    .daily-word-label {
      font-size: 0.625rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    body:not(.guide-mode) .daily-word-label { color: #fde68a; }
    body.guide-mode .daily-word-label { color: #b45309; }

    /* Aviso — solo Modo Guía */
    .guide-warning-box {
      border-radius: 0.875rem;
      padding: 0.75rem 0.875rem;
      margin-bottom: 1rem;
      background: rgba(255, 251, 235, 0.95);
      border: 1px solid rgba(251, 191, 36, 0.35);
    }

    .guide-warning-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.5625rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.2rem 0.5rem;
      border-radius: 9999px;
      margin-bottom: 0.45rem;
      border: 1px solid rgba(251, 191, 36, 0.4);
      color: #b45309;
      background: rgba(254, 243, 199, 0.85);
    }

    .guide-warning-box p {
      font-size: 0.8125rem;
      line-height: 1.55;
      color: #92400e;
    }

    /* Temas estacionales sutiles (Modo Joven — automático) */
    body.season-halloween:not(.guide-mode) .prina-mesh-bg {
      background-image:
        radial-gradient(at 10% 20%, rgba(249, 115, 22, 0.12) 0px, transparent 50%),
        radial-gradient(at 90% 10%, rgba(139, 92, 246, 0.12) 0px, transparent 40%),
        radial-gradient(at 80% 90%, rgba(255, 234, 0, 0.04) 0px, transparent 50%);
    }

    body.season-summer:not(.guide-mode) .prina-mesh-bg {
      background-image:
        radial-gradient(at 10% 20%, rgba(0, 240, 255, 0.14) 0px, transparent 50%),
        radial-gradient(at 90% 10%, rgba(255, 234, 0, 0.1) 0px, transparent 40%);
    }

    body.season-winter:not(.guide-mode) .prina-mesh-bg {
      background-image:
        radial-gradient(at 10% 20%, rgba(147, 197, 253, 0.12) 0px, transparent 50%),
        radial-gradient(at 90% 10%, rgba(139, 92, 246, 0.1) 0px, transparent 40%);
    }

    /* Temas estacionales — Modo Guía (elegibles por el usuario) */
    body.guide-mode.season-spring {
      background-color: #ecfdf5;
    }

    body.guide-mode.season-spring::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      z-index: 100010;
      pointer-events: none;
      background: linear-gradient(90deg, #34d399, #f472b6, #a78bfa, #34d399);
      background-size: 200% 100%;
      animation: seasonBarShift 8s linear infinite;
    }

    body.guide-mode.season-spring:not(.catalog-active)::before {
      display: none;
    }

    body.guide-mode.season-spring #landingFixedOverlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(90deg, #34d399, #f472b6, #a78bfa, #34d399);
      background-size: 200% 100%;
      animation: seasonBarShift 8s linear infinite;

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Alpha Book: diccionario juvenil moderno con Modo Joven y Modo Guía para padres y educadores. Definiciones claras de jerga actual.">
  <meta property="og:title" content="Alpha Book - El Diccionario Juvenil Moderno">
  <meta property="og:description" content="Entiende la jerga de hoy. Dos experiencias: dinámica para jóvenes y guía clara para padres.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#030307">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M35,75 L50,25 L65,75' stroke='%238b5cf6' stroke-width='11' fill='none'/%3E%3Ccircle cx='50' cy='50' r='48' stroke='%238b5cf6' stroke-width='1.5' fill='none' opacity='0.3'/%3E%3C/svg%3E">
  <title>Alpha Book - El Diccionario Juvenil Moderno</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts: Inter y Quicksand -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Quicksand', 'sans-serif'],
          },
          colors: {
            primaBlue: '#8b5cf6',      // Violeta Eléctrico
            primaLightBlue: '#00f0ff', // Neon Cyan / Azul cibernético
            primaYellow: '#ffea00',    // Cyber Amber / Amarillo neón
            primaGreen: '#39ff14',     // Toxic Lime / Verde radioactivo
            primaRed: '#ff0055',       // Crimson Rose / Rosa de alta frecuencia
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
      --intro-length: 3.4s;
      --motion-fast: 0.58s;
      --motion-base: 0.88s;
      --motion-slow: 1.85s;
    }

    body.site-intro-active,
    body.audience-entry:not(.catalog-active) {
      background: linear-gradient(145deg, #faf8f5 0%, #eef2f7 45%, #f3eef8 100%);
    }

    /* GPU-friendly motion defaults */
    .audience-enter,
    .neon-slide-item,
    .catalog-illuminable,
    .word-card,
    #landingView,
    #mainAppView,
    #introReveal,
    #audienceSelector,
    #siteIntroScreen {
      -webkit-font-smoothing: antialiased;
    }

    body.intro-active .prina-mesh-bg,
    body.intro-active .prina-mesh-bg::before,
    body.intro-active .marquee-track-container {
      animation-play-state: paused;
    }

    body.intro-active:not(.guide-mode) .prina-mesh-bg::before {
      transition: filter 1s var(--ease-smooth);
      filter: blur(38px);
    }

    body.intro-active:not(.guide-mode) .cyber-grid {
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    body.intro-active .bottom-ambient-glow.active {
      animation-play-state: paused;
    }

    @keyframes prinaBgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes seasonBarShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .search-hit {
      background: rgba(0, 240, 255, 0.22);
      color: inherit;
      border-radius: 0.2rem;
      padding: 0 0.15rem;
    }

    body.guide-mode .search-hit {
      background: rgba(139, 92, 246, 0.18);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
